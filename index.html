<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工程分析系統 - 旗艦穩定同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
    <style>
    body { font-size: 20px; font-family: sans-serif; }
    input, select, textarea { font-size: 20px !important; }
    .table-header-darkblue { background-color: #1e3a8a !important; color: white !important; }
    
    /* 調整表格欄位，確保內容不被遮蔽 */
    .actual-detail-table td { 
        font-size: 22px !important; 
        padding: 5px !important;
        overflow: visible !important;
    }

    /* 解決輸入框在列印時被裁切的問題 */
    .actual-detail-table input {
        width: 100% !important;
        min-width: 0 !important;
        background: transparent !important;
    }

    @media print {
        .no-print { display: none !important; }
        .no-print-flex { display: none !important; }
        
        /* 列印時強制顯示機具文字 */
        .print-show {
            display: block !important;
            font-size: 18px !important;
            line-height: 1.4 !important;
        }

        /* 移除輸入框邊框，讓數字像純文字一樣清楚 */
        input, textarea {
            border: none !important;
            box-shadow: none !important;
            outline: none !important;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        canvas {
            display: block !important;
            max-width: 100% !important;
            -webkit-print-color-adjust: exact !important; 
            print-color-adjust: exact !important;
        }
        .print-section {
            page-break-inside: avoid !important; 
            break-inside: avoid !important;
            margin-bottom: 20px;
        }
        
        /* 確保表格框線在列印時清晰 */
        table, th, td {
            border: 1px solid black !important;
        }
    }

    /* 自訂儲存按鈕動畫 */
    .btn-save-anim { animation: pulse-red 2s infinite; }
    @keyframes pulse-red {
        0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(225, 29, 72, 0); }
        100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); }
    }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div id="root"></div>
    <script type="text/babel">
const load = (k, f) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : f; } catch { return f; } };
const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));
const sortMachines = (list) => [...new Set(list)].sort((a,b) => (parseInt(a.match(/\d+/))||0) - (parseInt(b.match(/\d+/))||0));
const generateId = () => `id-${Date.now()}-${Math.floor(Math.random() * 1000000)}`;
const getShortDate = () => {
    const d = new Date();
    const yy = d.getFullYear().toString().slice(-2);
    const mm = (d.getMonth() + 1).toString().padStart(2, '0');
    const dd = d.getDate().toString().padStart(2, '0');
    return `${yy}${mm}${dd}`;
};
        
function App() {
    const [projects, setProjects] = React.useState(load("projects", []));
    const [currentProjectId, setCurrentProjectId] = React.useState(load("currentProjectId", ""));
    const [companies, setCompanies] = React.useState(load("companies", ["紘展", "元鴻"]));
    const [currentCompany, setCurrentCompany] = React.useState(load("currentCompany", "紘展"));
    const [records, setRecords] = React.useState(load("records", []));
    const [projectPlans, setProjectPlans] = React.useState(load("projectPlans", {}));
    const [machineOptions, setMachineOptions] = React.useState(load("machineOptions", ["25T 吊車", "45T 吊車", "高空作業車"]));
    const [projectStatus, setProjectStatus] = React.useState(load("projectStatus", {}));
    const [modalType, setModalType] = React.useState("");
    const [syncStatus, setSyncStatus] = React.useState({ loading: false, lastTime: load("lastSyncTime", "尚未同步") });
    const [cloudWarning, setCloudWarning] = React.useState(""); // 自動同步失敗時的低調提示（不用 alert 打擾使用者）
    const [projectVersions, setProjectVersions] = React.useState(load("projectVersions", {})); // {projectId: 版本號} 用來偵測多人同時編輯衝突
    const [entryForm, setEntryForm] = React.useState({ date: new Date().toISOString().split('T')[0], labor: 0, support: 0, note: "", machines: [] });

    const GAS_URL = "https://script.google.com/macros/s/AKfycbzc7eXQObf5fkZ4iqje4_I4U3avG9fveDJe3UumMuaH5v0uSo8M75w_e_IbdRiuHtqPSg/exec";

    const currentProject = projects.find(p => p.id === currentProjectId);
    const currentPlans = projectPlans[currentProjectId] || [];
    const isCompleted = projectStatus[currentProjectId] || false;

    const projectRecords = records.filter(r => r.projectId === currentProjectId && r.company === currentCompany);
    const dailyDetails = {};
    projectRecords.forEach(r => {
        if (!dailyDetails[r.date]) dailyDetails[r.date] = { labor: 0, support: 0, machines: [], notes: [], raw: [] };
        dailyDetails[r.date].raw.push(r);
        if (r.type === "labor") { 
            dailyDetails[r.date].labor += Number(r.labor || 0); 
            dailyDetails[r.date].support += Number(r.support || 0); 
            if (r.note) dailyDetails[r.date].notes.push(r.note); 
        }
        else { dailyDetails[r.date].machines.push(`${r.spec}(${(Number(r.hr)/8).toFixed(1)}台)`); }
    });

    const actTotalLabor = Object.values(dailyDetails).reduce((s, d) => s + d.labor, 0);
    const actTotalSupport = Object.values(dailyDetails).reduce((s, d) => s + d.support, 0);
    const actTotalSum = actTotalLabor + actTotalSupport;
    const estTotalLabor = currentPlans.reduce((s, p) => s + Number(p.labor || 0), 0);
    const estTotalSupport = currentPlans.reduce((s, p) => s + Number(p.support || 0), 0);
    const estTotalSum = estTotalLabor + estTotalSupport;

    // --- 修改：僅手動調用的同步函數（已移除 no-cors，可正確判斷成功/失敗，並加入版本號衝突偵測）---
    const syncToCloud = async (customData = null, skipVersionCheck = false) => {
        if (!currentProjectId && !customData) return false;
        if (syncStatus.loading) return false; // 防止重複點擊造成並發寫入
        setSyncStatus(prev => ({ ...prev, loading: true }));
        const targetProjectId = customData?.projectId || currentProjectId;
        const payload = {
            company: currentCompany,
            projectName: customData?.projectName || currentProject?.name,
            projectId: targetProjectId,
            clientVersion: skipVersionCheck ? null : (projectVersions[targetProjectId] || 0),
            skipVersionCheck: skipVersionCheck,
            equipments: customData?.equipments || machineOptions, 
            plans: customData?.plans || currentPlans,
            records: customData?.records || records.filter(r => r.projectId === currentProjectId),
            projects: customData?.projects || projects,
            projectStatus: customData?.projectStatus || projectStatus,
            deletedProjectId: customData?.deletedProjectId || null
        };
        try {
            const res = await fetch(GAS_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" }, // 避免瀏覽器送出 preflight OPTIONS，GAS 端用 text/plain 接收即可
                body: JSON.stringify(payload)
            });
            let result;
            try { result = await res.json(); } catch (parseErr) { throw new Error("伺服器回應格式錯誤，可能未部署為最新版本"); }

            if (result.status === "conflict") {
                setSyncStatus(prev => ({ ...prev, loading: false }));
                alert("⚠️ 存檔失敗：這個工程已經被其他人更新過了！\n\n為了避免覆蓋別人剛存的資料，這次的儲存已被取消。\n請先按「🔄 同步雲端(讀取)」抓取最新版本，確認內容後再重新編輯、儲存。");
                return false;
            }
            if (!res.ok || result.status !== "ok") {
                throw new Error(result.message || `伺服器回傳錯誤 (HTTP ${res.status})`);
            }

            // 存檔成功，更新本地版本號，避免下一次自己存檔時被誤判為衝突
            if (typeof result.version === "number" && targetProjectId) {
                setProjectVersions(prev => ({ ...prev, [targetProjectId]: result.version }));
            }
            const time = new Date().toLocaleTimeString();
            setSyncStatus({ loading: false, lastTime: time });
            save("lastSyncTime", time);
            setCloudWarning("");
            return true;
        } catch (e) {
            setSyncStatus(prev => ({ ...prev, loading: false }));
            alert("❌ 儲存失敗，資料尚未同步到雲端：\n" + e.message + "\n\n請檢查網路連線，並重新按一次「儲存並同步雲端」。");
            return false;
        }
    };

    const downloadFromCloud = async (silent = false) => {
        if (syncStatus.loading) return;
        setSyncStatus(prev => ({ ...prev, loading: true }));
        try {
            const response = await fetch(`${GAS_URL}?t=${Date.now()}`, { method: "GET" });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const cloud = await response.json();
            const newProjects = cloud.projects ? cloud.projects.map(p => ({ id: String(p["工程ID"] || generateId()), name: String(p["工程名稱"]) })) : [];
            setProjects(newProjects);
            if (cloud.projects) {
                const versionMap = {};
                cloud.projects.forEach(p => { versionMap[String(p["工程ID"])] = Number(p["版本"] || 0); });
                setProjectVersions(versionMap);
            }
            if (cloud.equipments) setMachineOptions(sortMachines(cloud.equipments.map(e => e["機具名稱"])));
            if (cloud.plans) {
                const planMap = {};
                cloud.plans.forEach((p, idx) => {
                    const matchedProj = newProjects.find(proj => proj.name === p["工程名稱"]);
                    const targetId = matchedProj ? matchedProj.id : p["工程名稱"];
                    if (!planMap[targetId]) planMap[targetId] = [];
                    let parsedMachines = [];
                    if (p["機具組合"] && typeof p["機具組合"] === 'string' && p["機具組合"].startsWith('[')) {
                        try { parsedMachines = JSON.parse(p["機具組合"]); } catch(e) { parsedMachines = []; }
                    }
                    planMap[targetId].push({ id: `pl-${Date.now()}-${idx}-${Math.random()}`, task: p["預計工作內容"] || "", labor: Number(p["外包"] || 0), support: Number(p["何鑫"] || 0), machines: parsedMachines });
                });
                setProjectPlans(planMap);
            }
            if (cloud.records) {
                const actRecords = cloud.records.map((r, idx) => {
                    const matchedProj = newProjects.find(p => p.name === r["工程名稱"]);
                    let dateVal = r["日期"] || "";
                    if (dateVal && dateVal.includes("T")) dateVal = new Date(dateVal).toLocaleDateString('sv-SE');
                    return { id: `act-${Date.now()}-${idx}`, projectId: matchedProj ? matchedProj.id : r["工程名稱"], company: r["公司"], date: dateVal, type: r["分類"], labor: Number(r["外包"] || 0), support: Number(r["何鑫"] || 0), spec: r["規格"] || "", hr: Number(r["時數"] || 0), note: r["備註"] || "" };
                });
                setRecords(actRecords);
            }
            if (!silent) alert("📥 雲端資料已讀取並同步至本機！");
            setCloudWarning(""); // 成功讀到最新資料，清除任何舊的警告提示
            setSyncStatus({ loading: false, lastTime: new Date().toLocaleTimeString() });
        } catch (e) {
            if (!silent) {
                alert("❌ 讀取失敗：" + e.message);
            } else {
                // 自動同步失敗時不跳彈窗打擾使用者，但留下一個低調的提示，讓使用者知道目前看到的可能不是最新資料
                setCloudWarning("⚠️ 自動同步雲端失敗（" + e.message + "），目前顯示的可能不是最新資料，建議手動按「同步雲端(讀取)」");
            }
            setSyncStatus(prev => ({ ...prev, loading: false }));
        }
    };

    // 頁面開啟時自動從雲端抓一次最新資料，避免本機資料過舊或不完整
    React.useEffect(() => {
        downloadFromCloud(true);
    }, []);

    const exportToExcel = () => {
        if (!currentProject) return alert("請先選擇工程");
        const fileName = `${getShortDate()}-${currentProject.name}-安裝分析表.xlsx`;
        const wb = XLSX.utils.book_new();
        const pData = [["天序", "預計內容", "外包", "何鑫", "機具組合"]];
        currentPlans.forEach((p, i) => pData.push([i+1, p.task, p.labor, p.support, (p.machines||[]).map(m=>`${m.spec}x${m.qty}`).join(',')]));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(pData), "預估規劃");
        const aData = [["日期", "外包", "何鑫", "機具", "記事"]];
        Object.entries(dailyDetails).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([date, d]) => aData.push([date, d.labor, d.support, d.machines.join(','), d.notes.join('/')]));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aData), "實際執行");
        XLSX.writeFile(wb, fileName);
    };

    const exportToWord = () => {
        if (!currentProject) return alert("請先選擇工程");
        const fileName = `${getShortDate()}-${currentProject.name}-安裝分析表.doc`;
        const content = document.getElementById('export-area').innerHTML;
        const header = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><style>table{border-collapse:collapse;width:100%;} th,td{border:1px solid black;padding:5px;text-align:center;}</style></head><body>${content}</body></html>`;
        const link = document.createElement('a');
        link.href = URL.createObjectURL(new Blob(['\ufeff', header], { type: 'application/msword' }));
        link.download = fileName;
        link.click();
    };

    const handlePrint = () => {
        if (!currentProject) return alert("請先選擇工程案再執行輸出");
        const originalTitle = document.title;
        const fileName = `${getShortDate()}-${currentProject.name}-安裝分析表`;
        document.title = fileName;
        window.print();
        setTimeout(() => { document.title = originalTitle; }, 1000);
    };

    const pieRef = React.useRef(null);
    const chartRef = React.useRef(null);
    React.useEffect(() => {
        if (!pieRef.current || actTotalSum === 0) return;
        if (chartRef.current) chartRef.current.destroy();
        chartRef.current = new Chart(pieRef.current.getContext("2d"), {
            type: "pie",
            data: { labels: ["外包", "何鑫"], datasets: [{ data: [actTotalLabor, actTotalSupport], backgroundColor: ["#1e3a8a", "#fbbf24"] }] },
            plugins: [ChartDataLabels],
            options: { plugins: { datalabels: { color: '#fff', font: { weight: 'bold' }, formatter: (v) => (v*100/actTotalSum).toFixed(1) + "%" }}}
        });
    }, [actTotalSum, actTotalLabor, actTotalSupport]);

    React.useEffect(() => {
        save("projects", projects); save("records", records); save("projectPlans", projectPlans);
        save("machineOptions", machineOptions); save("currentProjectId", currentProjectId);
        save("projectStatus", projectStatus); save("currentCompany", currentCompany);
        save("projectVersions", projectVersions);
    }, [projects, records, projectPlans, machineOptions, currentProjectId, projectStatus, currentCompany, projectVersions]);

    return (
        <div className="max-w-7xl mx-auto pb-10">
            {cloudWarning && (
                <div className="no-print bg-yellow-100 border-2 border-yellow-500 text-yellow-900 px-4 py-3 rounded-lg mb-3 flex items-center justify-between gap-4">
                    <span>{cloudWarning}</span>
                    <button className="bg-yellow-500 text-white px-3 py-1 rounded font-bold shrink-0 hover:bg-yellow-600" onClick={()=>downloadFromCloud(false)}>重新讀取</button>
                </div>
            )}
            {/* 導覽列優化：增加明確儲存按鈕 */}
            <div className="no-print bg-white p-6 rounded-xl shadow mb-6 border flex flex-wrap gap-4 items-center font-bold sticky top-0 z-50">
                <div className="flex items-center gap-2 mr-4 text-sm text-gray-500">
                    <span className={`w-3 h-3 rounded-full ${syncStatus.loading ? 'bg-yellow-400 animate-pulse' : 'bg-green-500'}`}></span>
                    <span>最後同步: {syncStatus.lastTime}</span>
                </div>
                <button disabled={syncStatus.loading} className={`bg-amber-500 text-white px-4 py-2 rounded shadow-md hover:bg-amber-600 transition-colors ${syncStatus.loading ? 'opacity-50 cursor-not-allowed' : ''}`} onClick={()=>downloadFromCloud(false)}>{syncStatus.loading ? '⏳ 讀取中…' : '🔄 同步雲端(讀取)'}</button>
                
                {/* 核心功能：手動儲存按鈕 */}
                <button 
                    disabled={syncStatus.loading}
                    className={`bg-rose-600 text-white px-6 py-2 rounded shadow-lg btn-save-anim hover:bg-rose-700 transition-all active:scale-95 ${syncStatus.loading ? 'opacity-50 cursor-not-allowed' : ''}`}
                    onClick={async () => {
                        if(!currentProjectId) return alert("請選擇工程後再儲存");
                        if(confirm("確定要將目前的「預估規劃」與「實際紀錄」永久存入雲端嗎？\n這將更新雲端的該工程資料。")){
                            const ok = await syncToCloud();
                            if (ok) alert("✅ 資料已成功儲存至雲端資料庫！");
                            // 失敗時 syncToCloud 內部已經跳出錯誤訊息，這裡不再重複提示
                        }
                    }}
                >
                    {syncStatus.loading ? '⏳ 儲存中…' : '💾 儲存並同步雲端'}
                </button>

                <div className="h-8 border-r mx-2"></div>
                <select className="border-2 p-2 rounded text-blue-900 bg-blue-50" value={currentCompany} onChange={e=>setCurrentCompany(e.target.value)}>
                    {companies.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
                <select className="border-2 p-2 rounded text-blue-900" value={currentProjectId} onChange={e=>setCurrentProjectId(e.target.value)}>
                    <option value="">選擇工程案</option>
                    {projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                </select>

                <button className="bg-blue-600 text-white px-4 py-2 rounded font-bold" onClick={()=>{
                    const n=prompt("請輸入新工程名稱");
                    if(n){
                        const nid=generateId();
                        const nl=[...projects,{id:nid,name:n}];
                        setProjects(nl);
                        setCurrentProjectId(nid); // 新增後直接切換到這個工程，不用再手動選下拉選單
                    }
                }}>+ 新增工程</button>

                <button className="bg-red-500 text-white px-4 py-2 rounded font-bold" onClick={async ()=>{
                    if(!currentProjectId) return alert("請先選擇要刪除的工程");
                    const targetName = currentProject?.name;
                    const targetId = currentProjectId;
                    if(confirm(`⚠️ 警告：確定要永久刪除「${targetName}」嗎？此動作將立即同步雲端清單。`)){
                        const newList = projects.filter(p => p.id !== targetId);
                        const ok = await syncToCloud({ projects: newList, projectName: targetName, projectId: targetId, plans: [], records: [], deletedProjectId: targetId }, true);
                        if (ok) {
                            setProjects(newList);
                            setCurrentProjectId("");
                            alert("工程案已從雲端與本機刪除");
                        }
                        // 失敗時保留本機資料，不刪除，避免本機雲端不一致
                    }
                }}>🗑️ 刪除工程</button>

                <div className="flex gap-2">
                    <button className="bg-green-700 text-white px-4 py-2 rounded font-bold shadow-sm" onClick={exportToExcel}>📊 Excel</button>
                    <button className="bg-blue-800 text-white px-4 py-2 rounded font-bold shadow-sm" onClick={exportToWord}>📝 Word</button>
                    <button className="bg-slate-700 text-white px-4 py-2 rounded font-bold shadow-sm" onClick={()=>setModalType("manageMachines")}>⚙️ 機具庫</button>
                </div>
                <button className="bg-gray-800 text-white px-6 py-2 rounded ml-auto font-bold shadow-md" onClick={handlePrint}>🖨️ 列印 / PDF</button>
            </div>

            <div id="export-area">
                {/* 1. 預估規劃 */}
                <div className="bg-white p-6 rounded-xl shadow mb-8 border-t-8 border-blue-900 print-section">
                    <h2 className="text-2xl font-black mb-4 underline">📋 預估規劃 - {currentProject?.name} ({currentCompany})</h2>
                    <table className="w-full border-collapse">
                        <thead className="table-header-darkblue">
                            <tr><th className="border p-2">天序</th><th className="border p-2">工作內容</th><th className="border p-2">外包</th><th className="border p-2">何鑫</th><th className="border p-2">機具組合</th><th className="border p-2 no-print">操作</th></tr>
                        </thead>
                        <tbody>
                            {currentPlans.map((p, i) => (
                                <tr key={p.id} className="text-center border-b hover:bg-gray-50">
                                    <td className="border p-2 font-bold">{i+1}</td>
                                    <td className="border p-2"><textarea className="w-full bg-transparent p-1" rows="1" value={p.task} onChange={e=>setProjectPlans({...projectPlans,[currentProjectId]:currentPlans.map(x=>x.id===p.id?{...x,task:e.target.value}:x)})}/></td>
                                    <td className="border p-2"><input type="number" className="w-full text-center font-bold text-blue-800" value={p.labor} onChange={e=>setProjectPlans({...projectPlans,[currentProjectId]:currentPlans.map(x=>x.id===p.id?{...x,labor:Number(e.target.value)}:x)})}/></td>
                                    <td className="border p-2"><input type="number" className="w-full text-center font-bold text-orange-600" value={p.support} onChange={e=>setProjectPlans({...projectPlans,[currentProjectId]:currentPlans.map(x=>x.id===p.id?{...x,support:Number(e.target.value)}:x)})}/></td>
                                    <td className="border p-2">
                                        <div className="flex flex-col gap-1 items-center">
                                            {(p.machines || []).map((m, mi) => (
                                                <div key={`${p.id}-m-${mi}`} className="flex items-center gap-1 bg-blue-50 p-1 rounded no-print-flex">
                                                    <select className="border rounded font-bold text-sm bg-white" value={m.spec} onChange={e=>{
                                                        const nm=p.machines.map((x,idx)=>idx===mi?{...x,spec:e.target.value}:x);
                                                        setProjectPlans({...projectPlans,[currentProjectId]:currentPlans.map(x=>x.id===p.id?{...x,machines:nm}:x)});
                                                    }}>
                                                        {machineOptions.map((opt, oi) => <option key={oi} value={opt}>{opt}</option>)}
                                                    </select>
                                                    <div className="flex items-center gap-1">
                                                        <input type="number" className="w-12 border rounded text-center text-sm" value={m.qty} onChange={e=>{
                                                            const nm=p.machines.map((x,idx)=>idx===mi?{...x,qty:Number(e.target.value)}:x);
                                                            setProjectPlans({...projectPlans,[currentProjectId]:currentPlans.map(x=>x.id===p.id?{...x,machines:nm}:x)});
                                                        }}/>
                                                        <span className="text-xs font-bold text-gray-400">天</span>
                                                    </div>
                                                    <button className="no-print text-red-500 font-bold px-1" onClick={()=>{
                                                        const nm=p.machines.filter((_,idx)=>idx!==mi);
                                                        setProjectPlans({...projectPlans,[currentProjectId]:currentPlans.map(x=>x.id===p.id?{...x,machines:nm}:x)});
                                                    }}>✕</button>
                                                </div>
                                            ))}
                                            <div className="hidden print:block text-sm">{(p.machines || []).map((m, mi)=><div key={`p-${mi}`}>{m.spec}x{m.qty}天</div>)}</div>
                                            <button className="text-xs text-blue-600 font-bold no-print underline" onClick={()=>{
                                                const nm=[...(p.machines||[]),{spec:machineOptions[0],qty:1}];
                                                setProjectPlans({...projectPlans,[currentProjectId]:currentPlans.map(x=>x.id===p.id?{...x,machines:nm}:x)});
                                            }}>+新增機具</button>
                                        </div>
                                    </td>
                                    <td className="border p-2 no-print"><button className="text-red-500 font-bold hover:bg-red-50 px-2 rounded" onClick={()=>{if(confirm("確定刪除？")){setProjectPlans({...projectPlans,[currentProjectId]:currentPlans.filter(x=>x.id!==p.id)});}}}>刪除</button></td>
                                </tr>
                            ))}
                        </tbody>
                        <tfoot className="bg-blue-900 text-white font-black">
                            <tr><td colSpan="2" className="p-2 text-right">預計合計：</td><td className="p-2">{estTotalLabor}</td><td className="p-2">{estTotalSupport}</td><td colSpan="2">共 {estTotalSum} 工</td></tr>
                        </tfoot>
                    </table>
                    <button className="no-print mt-4 bg-blue-100 p-2 rounded font-bold shadow-sm" onClick={()=>{
                        const nl=[...currentPlans,{id:generateId(),task:"",labor:0,support:0,machines:[]}];
                        setProjectPlans({...projectPlans,[currentProjectId]:nl});
                    }}>+ 新增天序</button>
                </div>

                {/* 2. 實際明細 */}
                <div className="bg-white p-6 rounded-xl shadow mb-8 border-t-8 border-green-700 print-section">
                    <h2 className="text-2xl font-black text-green-800 mb-4 flex justify-between items-center">
                        <span>📅 實際明細 - {currentProject?.name} ({currentCompany})</span>
                        <button className="no-print bg-green-600 text-white px-6 py-2 rounded font-bold shadow" onClick={()=>setModalType("entry")}>📝 登打紀錄</button>
                    </h2>
                    <table className="w-full border-collapse text-center actual-detail-table" style={{ tableLayout: 'fixed' }}>
                        <thead className="table-header-darkblue">
                            <tr>
                                <th style={{ width: '15%' }} className="border p-2">日期</th>
                                <th style={{ width: '8%' }} className="border p-2">外包</th>
                                <th style={{ width: '8%' }} className="border p-2">何鑫</th>
                                <th style={{ width: '28%' }} className="border p-2">機具(hr)</th>
                                <th style={{ width: '31%' }} className="border p-2">記事備註</th>
                                <th style={{ width: '10%' }} className="border p-2 no-print">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            {Object.entries(dailyDetails).sort((a,b)=>a[0].localeCompare(b[0])).map(([date, data]) => (
                                <tr key={date} className="hover:bg-green-50 border-b">
                                    <td className="border p-2 font-bold text-xl text-center">{date}</td>
                                    <td className="border p-2 text-center">
                                        <input type="number" className="w-full text-center font-black text-blue-800 bg-transparent outline-none focus:border-b-2 focus:border-blue-500" value={data.labor} onChange={e=>setRecords(records.map(r=>(r.projectId===currentProjectId && r.date===date && r.type==="labor")?{...r,labor:Number(e.target.value)}:r))}/>
                                    </td>
                                    <td className="border p-2 text-center">
                                        <input type="number" className="w-full text-center font-black text-orange-600 bg-transparent outline-none focus:border-b-2 focus:border-orange-500" value={data.support} onChange={e=>setRecords(records.map(r=>(r.projectId===currentProjectId && r.date===date && r.type==="labor")?{...r,support:Number(e.target.value)}:r))}/>
                                    </td>
                                    {/* 修改後的機具欄位 TD */}
<td className="border p-2 text-left">
    <div className="flex flex-col gap-1">
        {/* 編輯模式：僅在螢幕顯示 */}
        {data.raw.filter(r => r.type === "crane").map((m, mi) => (
            <div key={m.id || mi} className="flex items-center gap-1 bg-blue-50 p-1 rounded no-print-flex">
                <select className="border rounded font-bold bg-white text-xs flex-1" value={m.spec} onChange={e=>setRecords(records.map(r=>r.id===m.id?{...r,spec:e.target.value}:r))}>
                    {machineOptions.map((opt, oi)=><option key={oi} value={opt}>{opt}</option>)}
                </select>
                <div className="flex items-center gap-1">
                    <input type="number" className="w-10 border rounded text-center font-bold text-xs" value={m.hr} onChange={e=>setRecords(records.map(r=>r.id===m.id?{...r,hr:Number(e.target.value)}:r))}/>
                    <span className="text-[10px] font-bold text-gray-400">hr</span>
                </div>
                <button className="no-print text-red-500 font-bold px-1" onClick={()=>setRecords(records.filter(r=>r.id!==m.id))}>✕</button>
            </div>
        ))}
        
        {/* 列印模式：純文字顯示 */}
        <div className="hidden print-machine-list hidden print:block text-left text-sm font-bold">
            {data.raw.filter(r => r.type === "crane").map((m, mi) => (
                <div key={`print-m-${mi}`}>{m.spec}: {m.hr} hr</div>
            ))}
        </div>

        <button className="text-xs text-blue-600 font-bold no-print underline" onClick={()=>{
            setRecords([...records, { id: generateId(), projectId: currentProjectId, company: currentCompany, date: date, type: "crane", spec: machineOptions[0], hr: 8 }]);
        }}>+增機具</button>
    </div>
</td>
                                    <td className="border p-2">
                                        <textarea className="w-full bg-transparent p-1 text-base leading-tight outline-none focus:bg-white rounded" rows="2" value={data.notes.join('\n')} onChange={e=>setRecords(records.map(r=>(r.projectId===currentProjectId && r.date===date && r.type==="labor")?{...r,note:e.target.value}:r))}/>
                                    </td>
                                    <td className="border p-2 no-print text-center">
                                        <button className="bg-red-100 text-red-600 px-3 py-1 rounded-md font-bold hover:bg-red-600 hover:text-white" onClick={()=>{if(confirm("確定刪除此日全部紀錄？")){setRecords(records.filter(r=>!(r.projectId===currentProjectId && r.date===date)));}}}>刪除</button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                        <tfoot className="bg-green-800 text-white font-black text-xl">
                            <tr>
                                <td className="p-2 border">實際合計</td>
                                <td className="p-2 border">{actTotalLabor}</td>
                                <td className="p-2 border">{actTotalSupport}</td>
                                <td colSpan="3" className="p-2 border text-right pr-10">共 {actTotalSum} 工</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>

                {/* 3. 施工分析報表 */}
                <div className="bg-white p-8 rounded-xl shadow border-4 border-gray-800 print-section">
                    <h2 className="text-3xl font-black text-center mb-8 uppercase underline">{currentProject?.name} 施工分析報表</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                        <div className="space-y-8">
                            <div>
                                <h3 className="font-bold text-2xl mb-4 border-l-8 border-blue-900 pl-4 text-blue-900">1. 工數分析統計</h3>
                                <table className="w-full border-2 border-gray-800 text-center text-xl font-bold">
                                    <thead className="bg-gray-800 text-white">
                                        <tr><th className="p-2">類別</th><th className="p-2">預計</th><th className="p-2">實際</th><th className="p-2">偏差</th></tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td className="border p-2">總工數</td>
                                            <td className="border p-2">{estTotalSum}</td>
                                            <td className="border p-2">{actTotalSum}</td>
                                            <td className={`border p-2 ${actTotalSum > estTotalSum ? "text-red-600" : "text-green-700"}`}>
                                                {actTotalSum - estTotalSum}
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div>
                                <h3 className="font-bold text-2xl mb-4 border-l-8 border-green-700 pl-4 text-green-800">2. 機具對比統計 (台)</h3>
                                <table className="w-full border-2 border-gray-800 text-center text-lg font-bold">
                                    <thead className="bg-gray-100">
                                        <tr><th className="p-2 border">機具規格</th><th className="p-2 border">預計</th><th className="p-2 border">實際</th><th className="p-2 border">偏差</th></tr>
                                    </thead>
                                    <tbody>
                                        {(() => {
                                            const estStats = {};
                                            currentPlans.forEach(p => (p.machines || []).forEach(m => { estStats[m.spec] = (estStats[m.spec] || 0) + Number(m.qty || 0); }));
                                            const actStats = {};
                                            projectRecords.filter(r => r.type === "crane").forEach(r => { actStats[r.spec] = (actStats[r.spec] || 0) + (Number(r.hr || 0) / 8); });
                                            const allSpecs = [...new Set([...Object.keys(estStats), ...Object.keys(actStats)])];
                                            if (allSpecs.length === 0) return <tr><td colSpan="4" className="p-4 text-center">尚無機具紀錄</td></tr>;
                                            return allSpecs.map(spec => {
                                                const est = estStats[spec] || 0;
                                                const act = actStats[spec] || 0;
                                                const diff = act - est;
                                                return (
                                                    <tr key={spec}>
                                                        <td className="border p-2 text-left pl-4">{spec}</td>
                                                        <td className="border p-2">{est.toFixed(1)}</td>
                                                        <td className="border p-2">{act.toFixed(1)}</td>
                                                        <td className={`border p-2 ${diff > 0 ? "text-red-600" : diff < 0 ? "text-green-700" : ""}`}>{diff > 0 ? `+${diff.toFixed(1)}` : diff.toFixed(1)}</td>
                                                    </tr>
                                                );
                                            });
                                        })()}
                                    </tbody>
                                </table>
                            </div>
                            <div className="p-6 bg-blue-50 border-4 border-blue-900 rounded-lg flex items-center justify-between shadow-inner">
                                <h4 className="text-2xl font-black">狀態：{isCompleted ? <span className="text-red-600 font-black">已結案</span> : <span className="text-blue-600">施工中</span>}</h4>
                                <div className="flex items-center gap-2">
                                    <span className="text-sm font-bold no-print">標記結案:</span>
                                    <input type="checkbox" className="w-10 h-10 accent-blue-900 cursor-pointer no-print" checked={isCompleted} onChange={e=>setProjectStatus({...projectStatus,[currentProjectId]:e.target.checked})}/>
                                </div>
                            </div>
                        </div>
                        <div className="flex flex-col items-center justify-center" style={{ pageBreakInside: 'avoid' }}>
                             <h3 className="font-bold text-2xl mb-4 text-center">實際工數佔比分析</h3>
                             <div className="w-80 h-80 relative"><canvas ref={pieRef} style={{ width: '320px', height: '320px' }}></canvas></div>
                        </div>
                    </div>
                </div>
            </div>

            {/* Modal: 實際執行登錄 */}
            {modalType === "entry" && (
                <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                    <div className="bg-white p-8 rounded-2xl w-full max-w-2xl shadow-2xl overflow-y-auto max-h-[90vh] border-t-8 border-green-600 font-bold">
                        <h3 className="font-black text-3xl mb-6 text-green-700 border-b pb-2">📝 實際執行登錄</h3>
                        <div className="grid grid-cols-2 gap-6 mb-6">
                            <div><label>日期:</label><input type="date" className="border-2 p-3 w-full rounded" value={entryForm.date} onChange={e=>setEntryForm({...entryForm, date:e.target.value})}/></div>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-blue-800">外包</label><input type="number" className="border-2 p-3 w-full rounded text-center" value={entryForm.labor} onChange={e=>setEntryForm({...entryForm, labor:e.target.value})}/></div>
                                <div><label className="text-orange-600">何鑫</label><input type="number" className="border-2 p-3 w-full rounded text-center" value={entryForm.support} onChange={e=>setEntryForm({...entryForm, support:e.target.value})}/></div>
                            </div>
                        </div>
                        <div className="mb-6 bg-gray-50 p-4 rounded-xl border">
                            <label className="text-xl mb-3 block border-b">機具使用 (時數):</label>
                            {entryForm.machines.map((m, idx) => (
                                <div key={`entry-m-${idx}`} className="flex gap-2 mb-3 items-center">
                                    <select className="border-2 p-2 rounded flex-1 bg-white" value={m.spec} onChange={e=>setEntryForm({...entryForm,machines:entryForm.machines.map((x,i)=>i===idx?{...x,spec:e.target.value}:x)})}>
                                        {machineOptions.map((o, oi)=><option key={oi} value={o}>{o}</option>)}
                                    </select>
                                    <div className="flex items-center gap-1">
                                        <input type="number" className="border-2 p-2 w-24 rounded text-center" placeholder="時數" value={m.hr} onChange={e=>setEntryForm({...entryForm,machines:entryForm.machines.map((x,i)=>i===idx?{...x,hr:e.target.value}:x)})}/>
                                        <span>hr</span>
                                    </div>
                                    <button className="text-red-500 px-2 text-2xl" onClick={()=>setEntryForm({...entryForm,machines:entryForm.machines.filter((_,i)=>i!==idx)})}>✕</button>
                                </div>
                            ))}
                            <button className="text-blue-600 underline" onClick={()=>setEntryForm({...entryForm,machines:[...entryForm.machines,{spec:machineOptions[0],hr:8}]})}>+ 新增機具項目</button>
                        </div>
                        <textarea className="border-2 p-3 w-full rounded h-24 mb-6" placeholder="備註記事內容..." value={entryForm.note} onChange={e=>setEntryForm({...entryForm,note:e.target.value})}/>
                        <div className="flex gap-4">
                            <button className="bg-green-700 text-white flex-1 py-5 rounded-xl font-black text-2xl shadow-lg hover:bg-green-800" onClick={() => {
                                const nr = [...records, { projectId: currentProjectId, company: currentCompany, date: entryForm.date, id: generateId(), type: "labor", labor: Number(entryForm.labor), support: Number(entryForm.support), note: entryForm.note }];
                                entryForm.machines.forEach(m => { nr.push({ projectId: currentProjectId, company: currentCompany, date: entryForm.date, id: generateId(), type: "crane", spec: m.spec, hr: Number(m.hr) }); });
                                setRecords(nr); setModalType("");
                            }}>儲存至本機(記得最後按同步儲存鈕)</button>
                            <button className="bg-gray-200 px-8 rounded-xl" onClick={()=>setModalType("")}>取消</button>
                        </div>
                    </div>
                </div>
            )}

            {/* Modal: 機具庫管理 */}
            {modalType === "manageMachines" && (
                <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                    <div className="bg-white p-6 rounded-xl w-full max-w-md shadow-2xl font-bold">
                        <h3 className="font-black text-2xl mb-4 border-b pb-2">⚙️ 雲端機具庫管理</h3>
                        <div className="space-y-2 mb-4 max-h-64 overflow-y-auto">
                            {machineOptions.map((m, mi) => (
                                <div key={mi} className="flex justify-between border p-2 rounded bg-gray-50 items-center">
                                    <span>{m}</span>
                                    <button className="text-red-500 hover:bg-red-100 px-2 rounded" onClick={()=>{
                                        const nl=machineOptions.filter(x=>x!==m);
                                        setMachineOptions(nl);
                                    }}>✕</button>
                                </div>
                            ))}
                        </div>
                        <button className="bg-blue-600 text-white w-full py-3 rounded font-bold shadow-md hover:bg-blue-700" onClick={()=>{
                            const n=prompt("輸入新機具規格名稱");
                            if(n){ setMachineOptions(sortMachines([...machineOptions,n])); }
                        }}>+ 新增規格項目</button>
                        <button className="w-full mt-4 text-gray-500 font-bold" onClick={()=>setModalType("")}>關閉視窗</button>
                    </div>
                </div>
            )}
        </div>
    );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
